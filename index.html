<!DOCTYPE html>
<html>
<head>
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Weather App</h1>

    <div class="searchContainer">
        <input 
            class="inputField"
            id="cityField"
            type="text"
            placeholder="Enter city name..."
        />
        <button id="searchBtn">Search</button>
    </div>

    <div id="weatherContainer">
        <h2 id="cityName"></h2>
        <p id="temperature"></p>
        <p id="condition"></p>
        <p id="windSpeed"></p>
    </div>

    <p id="errorMessage"></p>
</div>

<script src="script.js"></script>
</body>
</html>
